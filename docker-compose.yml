services:
  dpoker:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/dpoker.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - JWT_EXPIRES_IN=30d
    restart: unless-stopped
